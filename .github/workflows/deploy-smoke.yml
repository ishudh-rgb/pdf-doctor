name: Deploy Smoke Test

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:
    inputs:
      target_url:
        description: "Production URL (e.g. https://onlymypdf.com)"
        required: true
        type: string

jobs:
  smoke:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Resolve target URL
        id: url
        run: |
          if [ -n "${{ github.event.inputs.target_url }}" ]; then
            echo "base=${{ github.event.inputs.target_url }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ secrets.PRODUCTION_URL }}" ]; then
            echo "base=${{ secrets.PRODUCTION_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=" >> "$GITHUB_OUTPUT"
          fi

      - name: Health check
        if: steps.url.outputs.base != ''
        run: |
          BASE="${{ steps.url.outputs.base }}"
          echo "Smoke testing $BASE"
          curl -fsS "$BASE/api/health" | tee health.json
          node -e "
            const h = require('./health.json');
            if (!h.status) throw new Error('Missing health status');
            console.log('Health status:', h.status);
          "
          curl -fsS -o /dev/null -w "%{http_code}" "$BASE/" | grep -E '^200$'
          curl -fsS -o /dev/null -w "%{http_code}" "$BASE/robots.txt" | grep -E '^200$'
          curl -fsS -o /dev/null -w "%{http_code}" "$BASE/sitemap.xml" | grep -E '^200$'

      - name: Skip (no PRODUCTION_URL secret)
        if: steps.url.outputs.base == ''
        run: |
          echo "Set repository secret PRODUCTION_URL or run workflow_dispatch with target_url."
